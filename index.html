<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Монитор статусов</title>
    <style>
        :root {
            --primary-color: #007bff;
            --bg-color: #f4f7f9;
        }
        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            background: var(--bg-color); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px; 
            color: #333; 
        }
        
        .card { 
            background: white; 
            border-radius: 16px; 
            padding: 24px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.06); 
            width: 100%; 
            max-width: 550px; 
            margin-bottom: 20px; 
        }
        h2 { margin-top: 0; font-size: 1.2rem; display: flex; align-items: center; gap: 8px; }
        
        /* Инфо-бокс */
        .status-info-box { 
            background: #eef6ff; 
            border-radius: 12px; 
            padding: 16px; 
            margin-bottom: 20px; 
            border-left: 4px solid var(--primary-color); 
        }
        .info-row { display: flex; align-items: center; gap: 10px; font-size: 0.9rem; margin: 4px 0; }
        .info-row b { color: var(--primary-color); }

        /* Сетка выбора статуса */
        .status-grid { display: flex; flex-wrap: wrap; gap: 8px; margin: 15px 0 25px 0; }
        .status-option { 
            padding: 8px 16px; border: 1px solid #dee2e6; border-radius: 20px; background: white;
            cursor: pointer; font-size: 0.9rem; transition: all 0.2s ease; 
        }
        .status-option:hover { border-color: var(--primary-color); background: #f8faff; }
        .status-option.active { background: var(--primary-color); color: white; border-color: var(--primary-color); }

        /* Кнопки */
        .btn { 
            width: 100%; padding: 12px; border: none; border-radius: 10px; 
            font-weight: bold; font-size: 1rem; cursor: pointer; transition: 0.3s; margin-top: 10px;
        }
        .btn-save { background: var(--primary-color); color: white; }
        .btn-save:hover { background: #0056b3; }
        .btn-logout { background: #dc3545; color: white; display: none; }
        .btn-google { background: #4285F4; color: white; display: block; }

        /* Список группы */
        .user-item { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid #f1f3f5; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; margin-right: 15px; }
        .username { font-weight: 600; flex-grow: 1; }
        .status-tag { font-size: 0.75rem; color: #6c757d; background: #f8f9fa; padding: 4px 10px; border-radius: 10px; border: 1px solid #eee; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="card">
        <h2>🔑 Аккаунт</h2>
        <div id="authContent">
            <button id="loginGoogle" class="btn btn-google">Войти через Google</button>
            <button id="logoutBtn" class="btn btn-logout">Выйти из аккаунта</button>
        </div>
    </div>

    <div id="myProfileCard" class="card hidden">
        <h2>👤 Мой профиль</h2>
        <div class="status-info-box">
            <div class="info-row">👨‍💻 Вы: <b id="displayUsername">...</b></div>
            <div class="info-row">📌 Статус: <span id="currentStatusText">не установлен</span></div>
        </div>

        <p style="font-size: 0.85rem; color: #666; margin-bottom: 5px;">Выберите новый статус:</p>
        <div class="status-grid" id="statusPicker">
            <div class="status-option" onclick="prepStatus(this, '🟢 Онлайн', '#28a745')">🟢 Онлайн</div>
            <div class="status-option" onclick="prepStatus(this, '☕ Отошёл', '#ffc107')">☕ Отошёл</div>
            <div class="status-option" onclick="prepStatus(this, '🔴 Не беспокоить', '#dc3545')">🔴 Не беспокоить</div>
            <div class="status-option" onclick="prepStatus(this, '🗓️ Встреча', '#007bff')">🗓️ Встреча</div>
            <div class="status-option" onclick="prepStatus(this, '🍜 Обед', '#6f42c1')">🍜 Обед</div>
        </div>
        <button class="btn btn-save" onclick="applyStatus()">Сохранить статус</button>
    </div>

    <div class="card">
        <h2>👥 Монитор группы</h2>
        <div id="groupList">Загрузка списка...</div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

        const URL = 'https://unnsbhztrdlonakztwtl.supabase.co'; 
        const KEY = 'sb_publishable_Cqmz3Pa7c9AvAuk6EmPTFQ_GovCnhpB'; 

        const supabase = createClient(URL, KEY);

        let currentUser = null;
        let tempStatus = { text: '', color: '' };

        // --- ЛОГИКА АВТОРИЗАЦИИ ---

        async function checkUser() {
            const { data: { user } } = await supabase.auth.getUser();
            currentUser = user;

            const loginBtn = document.getElementById('loginGoogle');
            const logoutBtn = document.getElementById('logoutBtn');
            const profileCard = document.getElementById('myProfileCard');

            if (user) {
                document.getElementById('displayUsername').innerText = user.email;
                loginBtn.classList.add('hidden');
                logoutBtn.style.display = 'block';
                profileCard.classList.remove('hidden');
                fetchGroup(); 
            } else {
                loginBtn.classList.remove('hidden');
                logoutBtn.style.display = 'none';
                profileCard.classList.add('hidden');
                fetchGroup();
            }
        }

        document.getElementById('loginGoogle').onclick = async () => {
            const { error } = await supabase.auth.signInWithOAuth({
                provider: 'google',
                options: { redirectTo: window.location.origin }
            });
            if (error) alert("Ошибка: " + error.message);
        };

        document.getElementById('logoutBtn').onclick = async () => {
            await supabase.auth.signOut();
            location.reload();
        };

        // --- ЛОГИКА СТАТУСОВ ---

        window.prepStatus = (element, text, color) => {
            document.querySelectorAll('.status-option').forEach(opt => opt.classList.remove('active'));
            element.classList.add('active');
            tempStatus = { text, color };
        };

        window.applyStatus = async () => {
            if (!currentUser) return alert("Войдите в аккаунт!");
            if (!tempStatus.text) return alert("Выберите статус!");

            // Обновляем профиль текущего юзера по его ID
            const { error } = await supabase
                .from('profiles')
                .upsert({ 
                    id: currentUser.id, 
                    username: currentUser.email,
                    status: tempStatus.text, 
                    color: tempStatus.color 
                });

            if (error) {
                console.error(error);
                alert("Ошибка сохранения! Проверьте RLS в Supabase.");
            } else {
                alert("Статус обновлен!");
                fetchGroup();
            }
        };

        async function fetchGroup() {
            const { data, error } = await supabase
                .from('profiles')
                .select('*')
                .order('username', { ascending: true });

            if (error) {
                document.getElementById('groupList').innerText = "Ошибка загрузки данных.";
                return;
            }

            const list = document.getElementById('groupList');
            list.innerHTML = data.map(user => `
                <div class="user-item">
                    <div class="status-dot" style="background: ${user.color || '#ccc'}"></div>
                    <div class="username">${user.username || 'Аноним'}</div>
                    <div class="status-tag">${user.status || 'Вне сети'}</div>
                </div>
            `).join('') || "Пользователей пока нет.";

            if (currentUser) {
                const me = data.find(u => u.id === currentUser.id);
                if (me) {
                    document.getElementById('currentStatusText').innerText = me.status || 'не задан';
                }
            }
        }

        // Запуск
        checkUser();
        // Обновляем список каждые 10 секунд
        setInterval(fetchGroup, 10000);
    </script>
</body>
</html>
