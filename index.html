<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Монитор статусов</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root { --primary-color:#007bff; --bg-color:#f4f7f9; }
    body { font-family: 'Segoe UI', Tahoma, sans-serif; background:var(--bg-color); display:flex; flex-direction:column; align-items:center; padding:20px; color:#333; }
    .card { background:white; border-radius:16px; padding:24px; box-shadow:0 4px 20px rgba(0,0,0,0.06); width:100%; max-width:650px; margin-bottom:20px; }
    h2 { margin-top:0; font-size:1.2rem; display:flex; align-items:center; gap:8px; }
    .status-info-box { background:#eef6ff; border-radius:12px; padding:16px; margin-bottom:20px; border-left:4px solid var(--primary-color); }
    .info-row { display:flex; align-items:center; gap:10px; font-size:0.9rem; margin:4px 0; }
    .status-grid { display:flex; flex-wrap:wrap; gap:8px; margin:15px 0 25px 0; }
    .status-option { padding:8px 16px; border:1px solid #dee2e6; border-radius:20px; background:white; cursor:pointer; font-size:0.9rem; transition:0.2s; display:flex; align-items:center; gap:6px; }
    .status-option.active { background:var(--primary-color); color:white; border-color:var(--primary-color); }
    .btn-save { width:100%; padding:12px; background:var(--primary-color); color:white; border:none; border-radius:10px; font-weight:bold; cursor:pointer; }
    .btn-red { background:#dc3545; margin-top:10px; }
    .user-item { display:flex; align-items:center; padding:12px 0; border-bottom:1px solid #f1f3f5; }
    .status-dot { width:10px; height:10px; border-radius:50%; margin-right:15px; }
    .username { font-weight:600; flex-grow:1; }
    .status-tag { font-size:0.75rem; color:#6c757d; background:#f8f9fa; padding:4px 10px; border-radius:10px; }
  </style>
</head>
<body>

  <div class="card">
    <h2>🔐 Авторизация</h2>
    <div style="display:flex; gap:8px; margin-top:12px;">
      <button id="signInBtn" class="btn-save">Войти через Google</button>
      <button id="signOutBtn" class="btn-save btn-red">Выйти</button>
    </div>
  </div>

  <div class="card">
    <h2>👤 Мой профиль</h2>
    <div class="status-info-box">
      <div class="info-row">👨‍💻 Вы зашли как: <b id="displayUsername">гость</b></div>
      <div class="info-row">📌 Статус: <span id="currentStatusText">—</span></div>
    </div>
    <div class="status-grid">
      <div class="status-option" onclick="setPick(this, '🟢 Онлайн')">🟢 Онлайн</div>
      <div class="status-option" onclick="setPick(this, '☕ Отошёл')">☕ Отошёл</div>
      <div class="status-option" onclick="setPick(this, '🔴 Не беспокоить')">🔴 Не беспокоить</div>
    </div>
    <button class="btn-save" onclick="saveStat()">Сохранить статус</button>
    <div style="margin-top:15px; border-top:1px solid #eee; padding-top:15px;">
      <button id="studyBtn" class="btn-save" style="background:#17a2b8;" onclick="toggleStudy()">Начать учёбу</button>
      <p style="font-size:0.9rem;">Время учёбы: <b id="studyTimeDisp">0</b> мин</p>
    </div>
  </div>

  <div class="card">
    <h2>👥 Монитор группы</h2>
    <div id="groupList">Загрузка...</div>
  </div>

<script>
    // ПРОВЕРЕНО: Ключи из твоих скриншотов
    const URL = 'https://unnsbhztrdlonakztwtl.supabase.co'.trim();
    const KEY = 'sb_publishable_Cqmz3Pa7c9AvAuk6EmPTFQ_GovCnhpB'.trim();
    const supabaseClient = supabase.createClient(URL, KEY);

    let user = null;
    let picked = '';
    let studyStart = null;

    // Вход/Выход
    document.getElementById('signInBtn').onclick = () => supabaseClient.auth.signInWithOAuth({ 
        provider: 'google', 
        options: { redirectTo: window.location.origin + window.location.pathname } 
    });
    document.getElementById('signOutBtn').onclick = () => { supabaseClient.auth.signOut(); location.reload(); };

    // Логика статусов
    window.setPick = (el, txt) => {
        document.querySelectorAll('.status-option').forEach(o => o.classList.remove('active'));
        el.classList.add('active');
        picked = txt;
    };

    window.saveStat = async () => {
        if(!user) return alert("Войдите!");
        await supabaseClient.from('profiles').update({ status: picked }).eq('id', user.id);
        updateUI();
    };

    window.toggleStudy = async () => {
        if(!user) return alert("Войдите!");
        const btn = document.getElementById('studyBtn');
        if(!studyStart) {
            studyStart = Date.now();
            btn.innerText = "Остановить"; btn.style.background = "#dc3545";
        } else {
            const mins = Math.floor((Date.now() - studyStart)/60000);
            if(mins > 0) {
                const {data} = await supabaseClient.from('profiles').select('study_time').eq('id', user.id).single();
                await supabaseClient.from('profiles').update({ study_time: (data?.study_time || 0) + mins }).eq('id', user.id);
            }
            studyStart = null; btn.innerText = "Начать учёбу"; btn.style.background = "#17a2b8";
            updateUI();
        }
    };

    async function updateUI() {
        const { data } = await supabaseClient.from('profiles').select('*').order('username');
        if(!data) return;
        document.getElementById('groupList').innerHTML = data.map(u => {
            const isOn = (new Date() - new Date(u.last_seen)) < 70000;
            return `<div class="user-item">
                <div class="status-dot" style="background:${isOn ? '#28a745' : '#ccc'}"></div>
                <div class="username">${u.username}</div>
                <div class="status-tag">${u.status || '—'} • ${u.study_time || 0}м</div>
            </div>`;
        }).join('');
        const me = data.find(u => u.id === user?.id);
        if(me) {
            document.getElementById('displayUsername').innerText = me.username;
            document.getElementById('currentStatusText').innerText = me.status || '—';
            document.getElementById('studyTimeDisp').innerText = me.study_time || 0;
        }
    }

    async function init() {
        const { data: { session } } = await supabaseClient.auth.getSession();
        if (session) {
            user = session.user;
            await supabaseClient.from('profiles').upsert({
                id: user.id,
                username: user.user_metadata.full_name || user.email,
                last_seen: new Date().toISOString()
            });
            setInterval(() => supabaseClient.from('profiles').update({ last_seen: new Date().toISOString() }).eq('id', user.id), 30000);
        }
        updateUI();
        setInterval(updateUI, 15000);
    }
    window.onload = init;
</script>
</body>
</html>
